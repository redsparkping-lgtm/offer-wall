<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offer Wall</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

.category {
    margin-bottom: 20px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #334155;
}

.category-header {
    background: #1e293b;
    padding: 15px;
    cursor: pointer;
    font-size: 20px;
    font-weight: bold;
}

.category-content {
    display: none;
    padding: 15px;
    background: #020617;
}

.card {
    background: #1e293b;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 15px;
}

.title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
}

.preview {
    width: 100%;
    height: 180px;
    overflow: hidden;
    border-radius: 8px;
    margin-bottom: 10px;
    border: 1px solid #334155;
}

.preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
}

.label {
    font-size: 14px;
    opacity: 0.7;
}

.value {
    font-size: 16px;
    margin-bottom: 8px;
}

.payout {
    color: #22c55e;
    font-weight: bold;
    font-size: 18px;
}

a {
    color: #38bdf8;
    text-decoration: none;
    font-size: 16px;
}
</style>

</head>

<body>

<h1>🔥 Offer Wall</h1>

<div id="offers"></div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRumI4oP83FrT13OLris4jnzpz8VuLtCvkZDcTlb9364hTvdruRWTthnyOb0o9VfiyzLvXgFiUgBtrQ/pub?gid=0&single=true&output=csv";

// 🔥 Convert Gyazo → Direct Image
function getGyazoImage(url) {
    if (url.includes("gyazo.com")) {
        const id = url.split("/").pop().split("?")[0];
        return `https://i.gyazo.com/${id}.png`;
    }
    return url;
}

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    const rows = data.trim().split("\n").slice(1);
    const container = document.getElementById("offers");

    let categories = {};

    rows.forEach(row => {
        const cols = row.split(",");

        const category = cols[0];
        const offerID = cols[1];
        const offerName = cols[2];
        const payout = cols[3];
        const preview = cols[4];
        const geo = cols[5];

        const previewImage = getGyazoImage(preview);

        if (!categories[category]) {
            categories[category] = [];
        }

        categories[category].push(`
        <div class="card">

            <div class="title">${offerName}</div>

            <div class="preview">
                <img src="${previewImage}" 
                     onerror="this.src='https://via.placeholder.com/600x300?text=No+Preview'">
            </div>

            <div class="label">Offer ID</div>
            <div class="value">${offerID}</div>

            <div class="label">Payout</div>
            <div class="payout">$${payout}</div>

            <div class="label">Countries or GEOs</div>
            <div class="value">${geo}</div>

            <div class="label">Preview Link</div>
            <a href="${preview}" target="_blank">View Offer</a>

        </div>
        `);
    });

    for (let category in categories) {
        container.innerHTML += `
        <div class="category">

            <div class="category-header" onclick="toggleCategory(this)">
                ${category}
            </div>

            <div class="category-content">
                ${categories[category].join("")}
            </div>

        </div>
        `;
    }

});

function toggleCategory(el) {
    const content = el.nextElementSibling;
    content.style.display = content.style.display === "block" ? "none" : "block";
}

</script>

</body>
</html>
