<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRumI4oP83FrT13OLris4jnzpz8VuLtCvkZDcTlb9364hTvdruRWTthnyOb0o9VfiyzLvXgFiUgBtrQ/pub?gid=0&single=true&output=csv";

let allData = [];

fetch(sheetURL)
.then(res => res.text())
.then(data => {

    const rows = data.split("\n");

    const headers = rows[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.trim());

    allData = rows.slice(1).map(row => {
        if (!row.trim()) return null;

        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

        let obj = {};
        headers.forEach((header, i) => {
            obj[header] = cols[i] ? cols[i].replace(/^"|"$/g, '') : "";
        });

        return {
            category: obj["Category Name"] || "Other",
            id: obj["Offer ID"] || "",
            name: obj["Offer Name"] || "",
            payout: obj["Payout"] || "",
            link: obj["Preview Link"] || "#",
            geo: obj["Countries or GEOs"] || ""
        };
    }).filter(Boolean);

    renderData(allData);
});


// ✅ CATEGORY GROUPED RENDER
function renderData(data) {
    const container = document.getElementById("offers");

    const grouped = {};

    data.forEach(offer => {
        const cat = offer.category || "Other";

        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(offer);
    });

    let html = "";

    for (let category in grouped) {

        html += `
        <div class="category">
            <div class="category-title">🔥 ${category}</div>
            <div class="container">
        `;

        grouped[category].forEach(offer => {
            html += `
            <div class="card">
                <div class="title">${offer.name}</div>

                <div class="label">Offer ID</div>
                <div>${offer.id}</div>

                <div class="label">Payout</div>
                <div class="payout">$${offer.payout}</div>

                <div class="label">GEO</div>
                <div>${offer.geo}</div>

                <div class="label">Preview</div>
                <a href="${offer.link}" target="_blank">View Offer</a>
            </div>
            `;
        });

        html += `</div></div>`;
    }

    container.innerHTML = html;
}


// ✅ SEARCH
document.getElementById("search").addEventListener("input", function() {
    const value = this.value.toLowerCase();

    const filtered = allData.filter(o =>
        o.name.toLowerCase().includes(value) ||
        o.id.toLowerCase().includes(value) ||
        o.geo.toLowerCase().includes(value)
    );

    renderData(filtered);
});
</script>
