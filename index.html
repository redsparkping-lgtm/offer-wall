<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offer Wall</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

#search {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-bottom: 20px;
    font-size: 14px;
}

/* CATEGORY BLOCK */
.category {
    margin-bottom: 20px;
    border-radius: 10px;
    overflow: hidden;
    background: #1e293b;
}

/* HEADER */
.category-header {
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    background: #334155;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.category-header:hover {
    background: #475569;
}

/* CONTENT */
.category-content {
    display: none;
    padding: 15px;
}

/* OFFER ITEM */
.offer {
    padding: 12px;
    border-bottom: 1px solid #334155;
}

.offer:last-child {
    border-bottom: none;
}

.label {
    font-size: 12px;
    opacity: 0.7;
}

.payout {
    color: #22c55e;
    font-weight: bold;
}

a {
    color: #38bdf8;
    text-decoration: none;
}
</style>

</head>
<body>

<h1>🔥 Offer Wall</h1>

<input type="text" id="search" placeholder="Search offers...">

<div id="offers"></div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRumI4oP83FrT13OLris4jnzpz8VuLtCvkZDcTlb9364hTvdruRWTthnyOb0o9VfiyzLvXgFiUgBtrQ/pub?gid=0&single=true&output=csv";

let allData = [];

// FETCH DATA
fetch(sheetURL)
.then(res => res.text())
.then(data => {

    const rows = data.split("\n");

    const headers = rows[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(h => h.trim());

    allData = rows.slice(1).map(row => {
        if (!row.trim()) return null;

        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

        let obj = {};
        headers.forEach((header, i) => {
            obj[header] = cols[i] ? cols[i].replace(/^"|"$/g, '') : "";
        });

        return {
            category: obj["Category Name"] || "Other",
            id: obj["Offer ID"] || "",
            name: obj["Offer Name"] || "",
            payout: obj["Payout"] || "",
            link: obj["Preview Link"] || "#",
            geo: obj["Countries or GEOs"] || ""
        };
    }).filter(Boolean);

    renderData(allData);
});


// RENDER CATEGORY + OFFERS
function renderData(data) {
    const container = document.getElementById("offers");

    const grouped = {};

    data.forEach(offer => {
        const cat = offer.category || "Other";

        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(offer);
    });

    let html = "";

    for (let category in grouped) {

        html += `
        <div class="category">
            <div class="category-header" onclick="toggleCategory(this)">
                ${category} (${grouped[category].length})
                <span>+</span>
            </div>

            <div class="category-content">
        `;

        grouped[category].forEach(offer => {
            html += `
            <div class="offer">
                <div><span class="label">Offer Name:</span> ${offer.name}</div>
                <div><span class="label">Offer ID:</span> ${offer.id}</div>
                <div><span class="label">Payout:</span> <span class="payout">$${offer.payout}</span></div>
                <div><span class="label">Preview Link:</span> <a href="${offer.link}" target="_blank">View Offer</a></div>
                <div><span class="label">Countries or GEOs:</span> ${offer.geo}</div>
            </div>
            `;
        });

        html += `</div></div>`;
    }

    container.innerHTML = html;
}


// TOGGLE CATEGORY
function toggleCategory(el) {
    const content = el.nextElementSibling;
    const icon = el.querySelector("span");

    if (content.style.display === "block") {
        content.style.display = "none";
        icon.innerText = "+";
    } else {
        content.style.display = "block";
        icon.innerText = "−";
    }
}


// SEARCH FUNCTION
document.getElementById("search").addEventListener("input", function() {
    const value = this.value.toLowerCase();

    const filtered = allData.filter(o =>
        o.name.toLowerCase().includes(value) ||
        o.id.toLowerCase().includes(value) ||
        o.geo.toLowerCase().includes(value)
    );

    renderData(filtered);
});
</script>

</body>
</html>
